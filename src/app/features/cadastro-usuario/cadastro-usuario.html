<div class="auth-split">
  <aside class="side" aria-hidden="true">
    <div class="side-inner">
      <div class="side-icon">
        <svg viewBox="0 0 64 64" width="56" height="56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M32 6C42 12 52 14 54 14V30C54 44 43 54 32 58C21 54 10 44 10 30V14C12 14 22 12 32 6Z"
            stroke="rgba(255,255,255,0.85)"
            stroke-width="2"
          />
          <path
            d="M20 28C25 20 40 20 44 28C48 36 41 44 32 49C23 44 16 36 20 28Z"
            fill="rgba(37,99,235,0.22)"
          />
          <path
            d="M22 31H42"
            stroke="rgba(255,255,255,0.95)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
          <path
            d="M32 21V41"
            stroke="rgba(255,255,255,0.95)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <h2>Comece com segurança e controle</h2>
      <p>Crie sua conta e ative com um código enviado por email.</p>
    </div>
  </aside>

  <div class="container">
    <h1>Faça seu cadastro!</h1>

    <div class="container-input">
      <label>Email</label>
      <input [(ngModel)]="this.email" placeholder="Digite seu email" />
    </div>

    <div class="container-input">
      <label>Senha</label>
      <input
        [(ngModel)]="this.password"
        type="password"
        placeholder="Digite sua senha"
        autocomplete="new-password"
      />
    </div>

    <button [disabled]="!(this.email() && this.password())" (click)="FazerCadastro()">
      Cadastrar
    </button>
  </div>
</div>
