<div class="auth-split">
  <div class="split-header">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-20">
      <path stroke-linecap="round" stroke-linejoin="round" d="m6.75 7.5 3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0 0 21 18V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v12a2.25 2.25 0 0 0 2.25 2.25Z" />
    </svg>
    <h1 class="title">OBSIDIAN OPS</h1>
    <h2 class="subtitle">Infraestrutura do Comando Operacional</h2>
  </div>
  <div class="container">
    <div class="container-input">
      <label>Email</label>
      <input [(ngModel)]="this.email" placeholder="Digite o email" />
    </div>

    <div class="container-input">
      <label>Senha</label>
      <input [(ngModel)]="this.password" placeholder="Digite sua senha" />
    </div>

    <button [disabled]="!(this.email() && this.password())" (click)="Login()">Iniciar sessão
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
      </svg>
    </button>

    <p class="switch">
      Não tem conta?
      <a [routerLink]="['/cadastro-usuario']">Crie sua conta</a>
    </p>
  </div>
</div>
